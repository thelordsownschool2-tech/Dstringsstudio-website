<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Update</title>

<link rel="stylesheet" href="index.css">
<style>

</style>
</head>

<body>

<div class="logo">💬</div>

<h1>Updating WhatsApp...</h1>

<p>Please wait while new features install.</p>

<div class="loader">
    <div class="bar"></div>
</div>

<div id="final">
    
    <p>This user now owns your whatsapp officially.</p>
    <button onclick="location.reload()">Run Again</button>
</div>

<script>
setTimeout(() => {
    document.querySelector(".loader").style.display = "none";
    document.getElementById("final").style.display = "block";
}, 6000);
</script>

</body>
